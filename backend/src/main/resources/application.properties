# MySQL configuration (override with environment variables in local/prod)
# Examples:
#   DB_URL=jdbc:mysql://localhost:3306/bits_hackathon_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#   DB_USERNAME=root
#   DB_PASSWORD=<your-mysql-password>
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/bits_hackathon_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration (override JWT_SECRET in production)
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f9g8h7i6j5k4l3m2n1o0p9q8r7s6t5u4v3w2x1y0z1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
